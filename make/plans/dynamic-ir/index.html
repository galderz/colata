<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C2 IR Visualizer</title>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<style>
  :root {
    --bg: #1a1b26;
    --surface: #24283b;
    --surface2: #2f3349;
    --border: #3b4261;
    --text: #c0caf5;
    --text-muted: #737aa2;
    --accent: #7aa2f7;
    --green: #9ece6a;
    --orange: #ff9e64;
    --red: #f7768e;
    --purple: #bb9af7;
    --cyan: #7dcfff;
    --yellow: #e0af68;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
  }

  header .subtitle {
    font-size: 12px;
    color: var(--text-muted);
  }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .sidebar {
    width: 380px;
    min-width: 380px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-section h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .ir-source {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }

  .ir-source h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .ir-line {
    font-size: 12px;
    line-height: 1.8;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    transition: background 0.2s, color 0.2s;
    cursor: default;
  }

  .ir-line.active {
    background: var(--accent);
    color: var(--bg);
    font-weight: 600;
  }

  .ir-line.completed {
    color: var(--green);
  }

  .ir-line.inactive {
    color: var(--text-muted);
  }

  .param-inputs {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .param-inputs label {
    font-size: 12px;
    color: var(--text-muted);
  }

  .param-inputs input {
    width: 70px;
    padding: 4px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    text-align: center;
  }

  .param-inputs input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .graph-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .graph-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .graph-container svg {
    width: 100%;
    height: 100%;
  }

  .controls {
    padding: 12px 20px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .controls button {
    padding: 8px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 44px;
  }

  .controls button:hover:not(:disabled) {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  .controls button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .step-info {
    padding: 6px 16px;
    font-size: 13px;
    color: var(--text);
    min-width: 240px;
    text-align: center;
  }

  .step-info .step-num {
    color: var(--accent);
    font-weight: 600;
  }

  .step-info .step-desc {
    color: var(--text-muted);
    font-size: 11px;
    margin-top: 2px;
  }

  /* SVG node styles */
  .node-group { cursor: pointer; }

  .node-rect {
    rx: 6;
    ry: 6;
    stroke-width: 2;
    transition: all 0.3s;
  }

  .node-rect.type-start { fill: #1a3a5c; stroke: var(--accent); }
  .node-rect.type-parm { fill: #1a3c2e; stroke: var(--green); }
  .node-rect.type-addi { fill: #3c2a1a; stroke: var(--orange); }
  .node-rect.type-return { fill: #2a1a3c; stroke: var(--purple); }
  .node-rect.type-root { fill: #3c1a2a; stroke: var(--red); }
  .node-rect.type-con { fill: #2a2a2a; stroke: var(--text-muted); }

  .node-rect.active {
    filter: drop-shadow(0 0 12px currentColor);
    stroke-width: 3;
  }

  .node-rect.completed { opacity: 0.9; }
  .node-rect.inactive { opacity: 0.35; }

  .node-label {
    fill: var(--text);
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    font-weight: 600;
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
  }

  .node-label.inactive { opacity: 0.35; }
  .node-label.active { fill: #fff; }

  .node-id {
    fill: var(--text-muted);
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 10px;
    text-anchor: middle;
    pointer-events: none;
  }

  .node-id.inactive { opacity: 0.35; }

  .node-value {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11px;
    font-weight: 600;
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
  }

  .node-sublabel {
    fill: var(--text-muted);
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 10px;
    text-anchor: middle;
    pointer-events: none;
  }

  .node-sublabel.inactive { opacity: 0.35; }

  .edge-path {
    fill: none;
    stroke-width: 1.5;
    transition: all 0.3s;
  }

  .edge-path.data { stroke: var(--text-muted); opacity: 0.4; }
  .edge-path.structural { stroke: var(--text-muted); opacity: 0.15; stroke-dasharray: 4 4; }
  .edge-path.active { stroke: var(--yellow); opacity: 1; stroke-width: 2.5; }
  .edge-path.completed { stroke: var(--green); opacity: 0.6; stroke-width: 1.5; }
  .edge-path.inactive { opacity: 0.15; }

  .edge-arrow {
    transition: all 0.3s;
  }

  .edge-arrow.data { fill: var(--text-muted); opacity: 0.4; }
  .edge-arrow.structural { fill: var(--text-muted); opacity: 0.15; }
  .edge-arrow.active { fill: var(--yellow); opacity: 1; }
  .edge-arrow.completed { fill: var(--green); opacity: 0.6; }
  .edge-arrow.inactive { opacity: 0.15; }

  .edge-value-bg {
    fill: var(--bg);
    rx: 3;
    ry: 3;
  }

  .edge-value {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 10px;
    font-weight: 600;
    fill: var(--yellow);
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
  }

  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-muted);
  }

  .legend-swatch {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    border: 1.5px solid;
  }

  kbd {
    display: inline-block;
    padding: 1px 5px;
    font-size: 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-muted);
    margin-left: 4px;
  }
</style>
</head>
<body>
<header>
  <h1>C2 IR Visualizer</h1>
  <span class="subtitle">Machine-independent intermediate representation &mdash; step-through execution</span>
</header>
<div class="main">
  <div class="sidebar">
    <div class="sidebar-section">
      <h2>Parameters</h2>
      <div class="param-inputs">
        <label>a = <input type="number" id="param-a" value="42"></label>
        <label>b = <input type="number" id="param-b" value="43"></label>
        <button id="apply-params" style="padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:inherit;font-size:11px;cursor:pointer;">Apply</button>
      </div>
    </div>
    <div class="sidebar-section">
      <h2>Legend</h2>
      <div class="legend">
        <div class="legend-item"><div class="legend-swatch" style="background:#1a3a5c;border-color:var(--accent)"></div>Start</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#1a3c2e;border-color:var(--green)"></div>Parm</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#3c2a1a;border-color:var(--orange)"></div>AddI</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#2a1a3c;border-color:var(--purple)"></div>Return</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#3c1a2a;border-color:var(--red)"></div>Root</div>
      </div>
    </div>
    <div class="sidebar-section">
      <h2>Keyboard</h2>
      <div style="font-size:11px;color:var(--text-muted);line-height:1.8">
        <kbd>&larr;</kbd> Previous step &nbsp;
        <kbd>&rarr;</kbd> Next step<br>
        <kbd>Home</kbd> First step &nbsp;
        <kbd>End</kbd> Last step
      </div>
    </div>
    <div class="ir-source" id="ir-source">
      <h2>IR Source</h2>
    </div>
  </div>
  <div class="graph-area">
    <div class="graph-container" id="graph-container">
      <svg id="graph-svg">
        <defs>
          <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5"
                  markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="context-fill"/>
          </marker>
          <marker id="arrow-active" viewBox="0 0 10 10" refX="10" refY="5"
                  markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--yellow)"/>
          </marker>
          <marker id="arrow-completed" viewBox="0 0 10 10" refX="10" refY="5"
                  markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--green)"/>
          </marker>
          <marker id="arrow-data" viewBox="0 0 10 10" refX="10" refY="5"
                  markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--text-muted)"/>
          </marker>
        </defs>
        <g id="graph-root"></g>
      </svg>
    </div>
    <div class="controls">
      <button id="btn-first" title="First step (Home)">|&laquo;</button>
      <button id="btn-prev" title="Previous step (&larr;)">&laquo;</button>
      <div class="step-info" id="step-info">
        <div class="step-num">Ready</div>
        <div class="step-desc">Press &rarr; to begin</div>
      </div>
      <button id="btn-next" title="Next step (&rarr;)">&raquo;</button>
      <button id="btn-last" title="Last step (End)">&raquo;|</button>
    </div>
  </div>
</div>

<script>
// ── IR Text ──
const IR_TEXT = `  0  Root  === 0 24  [[ 0 1 3 ]] inner
  1  Con  === 0  [[ ]]  #top
  3  Start  === 3 0  [[ 3 5 6 7 8 9 10 11 ]]  #{0:control, 1:abIO, 2:memory, 3:rawptr:BotPTR, 4:return_address, 5:int, 6:int}
  5  Parm  === 3  [[ 24 ]] Control !jvms: First::test @ bci:-1 (line 21)
  6  Parm  === 3  [[ 24 ]] I_O !jvms: First::test @ bci:-1 (line 21)
  7  Parm  === 3  [[ 24 ]] Memory  Memory: @ptr:BotPTR+bot, idx=Bot; !jvms: First::test @ bci:-1 (line 21)
  8  Parm  === 3  [[ 24 ]] FramePtr !jvms: First::test @ bci:-1 (line 21)
  9  Parm  === 3  [[ 24 ]] ReturnAdr !jvms: First::test @ bci:-1 (line 21)
 10  Parm  === 3  [[ 23 ]] Parm0: int !jvms: First::test @ bci:-1 (line 21)
 11  Parm  === 3  [[ 23 ]] Parm1: int !jvms: First::test @ bci:-1 (line 21)
 23  AddI  === _ 10 11  [[ 24 ]]  !jvms: First::test @ bci:2 (line 21)
 24  Return  === 5 6 7 8 9 returns 23  [[ 0 ]]`;

// ── Parser ──
function parseIR(text) {
  const nodes = {};
  const lines = text.trim().split('\n');

  for (const line of lines) {
    const match = line.match(/^\s*(\d+)\s+(\w+)\s+===\s+(.*?)\s*\[\[\s*(.*?)\s*\]\]\s*(.*)?$/);
    if (!match) continue;

    const id = parseInt(match[1]);
    const type = match[2];
    const inputStr = match[3].trim();
    const outputStr = match[4].trim();
    const extra = (match[5] || '').trim();

    const inputs = inputStr.split(/\s+/)
      .filter(t => t !== '_' && t !== 'returns' && /^\d+$/.test(t))
      .map(Number);

    const outputs = outputStr.split(/\s+/)
      .filter(t => /^\d+$/.test(t))
      .map(Number);

    // Extract sublabel from extra info
    let sublabel = '';
    if (type === 'Parm') {
      if (extra.startsWith('Control')) sublabel = 'Control';
      else if (extra.startsWith('I_O')) sublabel = 'I/O';
      else if (extra.startsWith('Memory')) sublabel = 'Memory';
      else if (extra.startsWith('FramePtr')) sublabel = 'FramePtr';
      else if (extra.startsWith('ReturnAdr')) sublabel = 'ReturnAdr';
      else if (extra.startsWith('Parm0')) sublabel = 'Parm0 (a)';
      else if (extra.startsWith('Parm1')) sublabel = 'Parm1 (b)';
    } else if (type === 'Con') {
      sublabel = '#top';
    }

    nodes[id] = { id, type, inputs, outputs, extra, sublabel, line: line.trim() };
  }
  return nodes;
}

// ── Build edges ──
function buildEdges(nodes) {
  const edges = [];
  const structuralPairs = new Set();

  // Self-loops and Root<->Start are structural
  structuralPairs.add('0->0');
  structuralPairs.add('3->3');
  structuralPairs.add('0->3');
  structuralPairs.add('0->1');

  for (const node of Object.values(nodes)) {
    for (const inputId of node.inputs) {
      if (inputId === node.id) continue; // skip self-loops
      const key = `${inputId}->${node.id}`;
      const isStructural = structuralPairs.has(key);
      edges.push({
        from: inputId,
        to: node.id,
        structural: isStructural,
        key
      });
    }
  }
  return edges;
}

// ── Execution steps ──
function buildExecutionSteps(nodes, paramA, paramB) {
  return [
    {
      name: 'Initial State',
      desc: 'Function test(a, b) is called. The graph represents the compiled computation.',
      activeNodes: [],
      activeEdges: [],
      completedNodes: [],
      completedEdges: [],
      values: {}
    },
    {
      name: 'Start',
      desc: `Function entry. Start node produces projections for control flow, I/O, memory, frame pointer, return address, and parameters a=${paramA}, b=${paramB}.`,
      activeNodes: [3],
      activeEdges: [],
      completedNodes: [],
      completedEdges: [],
      values: { 3: `{ctrl, io, mem, fp, ra, ${paramA}, ${paramB}}` }
    },
    {
      name: 'Parm Projection',
      desc: `Parm nodes project individual values from Start. Parm0 extracts a=${paramA}, Parm1 extracts b=${paramB}. Control, I/O, Memory, FramePtr, and ReturnAdr are also projected.`,
      activeNodes: [5, 6, 7, 8, 9, 10, 11],
      activeEdges: ['3->5', '3->6', '3->7', '3->8', '3->9', '3->10', '3->11'],
      completedNodes: [3],
      completedEdges: [],
      values: { 3: `{ctrl, io, mem, fp, ra, ${paramA}, ${paramB}}`, 5: 'ctrl', 6: 'io', 7: 'mem', 8: 'fp', 9: 'ra', 10: `${paramA}`, 11: `${paramB}` }
    },
    {
      name: 'AddI',
      desc: `Integer addition: AddI computes Parm0 + Parm1 = ${paramA} + ${paramB} = ${paramA + paramB}.`,
      activeNodes: [23],
      activeEdges: ['10->23', '11->23'],
      completedNodes: [3, 5, 6, 7, 8, 9, 10, 11],
      completedEdges: ['3->5', '3->6', '3->7', '3->8', '3->9', '3->10', '3->11'],
      values: { 10: `${paramA}`, 11: `${paramB}`, 23: `${paramA + paramB}` }
    },
    {
      name: 'Return',
      desc: `Return packages control, I/O, memory, frame pointer, return address, and the computed result ${paramA + paramB} for the caller.`,
      activeNodes: [24],
      activeEdges: ['5->24', '6->24', '7->24', '8->24', '9->24', '23->24'],
      completedNodes: [3, 5, 6, 7, 8, 9, 10, 11, 23],
      completedEdges: ['3->5', '3->6', '3->7', '3->8', '3->9', '3->10', '3->11', '10->23', '11->23'],
      values: { 23: `${paramA + paramB}`, 24: `returns ${paramA + paramB}` }
    },
    {
      name: 'Root',
      desc: `Execution complete. Root receives the return. The function test(${paramA}, ${paramB}) produced ${paramA + paramB}.`,
      activeNodes: [0],
      activeEdges: ['24->0'],
      completedNodes: [3, 5, 6, 7, 8, 9, 10, 11, 23, 24],
      completedEdges: ['3->5', '3->6', '3->7', '3->8', '3->9', '3->10', '3->11', '10->23', '11->23', '5->24', '6->24', '7->24', '8->24', '9->24', '23->24'],
      values: { 24: `returns ${paramA + paramB}`, 0: `done (${paramA + paramB})` }
    }
  ];
}

// ── Layout with dagre ──
function layoutGraph(nodes, edges) {
  const g = new dagre.graphlib.Graph();
  g.setGraph({
    rankdir: 'TB',
    ranksep: 70,
    nodesep: 30,
    marginx: 40,
    marginy: 40
  });
  g.setDefaultEdgeLabel(() => ({}));

  const nodeWidth = 120;
  const nodeHeight = 52;

  for (const node of Object.values(nodes)) {
    let w = nodeWidth;
    // Parm nodes can be narrower
    if (node.type === 'Parm') w = 100;
    g.setNode(String(node.id), { width: w, height: nodeHeight });
  }

  for (const edge of edges) {
    if (!edge.structural) {
      g.setEdge(String(edge.from), String(edge.to));
    }
  }

  dagre.layout(g);

  const positions = {};
  g.nodes().forEach(id => {
    const n = g.node(id);
    positions[parseInt(id)] = { x: n.x, y: n.y, w: n.width, h: n.height };
  });

  return positions;
}

// ── SVG Helpers ──
const SVG_NS = 'http://www.w3.org/2000/svg';

function createSVGElement(tag, attrs = {}) {
  const el = document.createElementNS(SVG_NS, tag);
  for (const [k, v] of Object.entries(attrs)) {
    el.setAttribute(k, v);
  }
  return el;
}

// ── Render ──
function renderGraph(nodes, edges, positions) {
  const root = document.getElementById('graph-root');
  root.innerHTML = '';

  const edgesGroup = createSVGElement('g', { id: 'edges-group' });
  const nodesGroup = createSVGElement('g', { id: 'nodes-group' });
  const valuesGroup = createSVGElement('g', { id: 'values-group' });
  root.appendChild(edgesGroup);
  root.appendChild(nodesGroup);
  root.appendChild(valuesGroup);

  // Draw edges
  for (const edge of edges) {
    const fromPos = positions[edge.from];
    const toPos = positions[edge.to];
    if (!fromPos || !toPos) continue;

    // Compute edge endpoints at node borders
    const fromX = fromPos.x;
    const fromY = fromPos.y + fromPos.h / 2;
    const toX = toPos.x;
    const toY = toPos.y - toPos.h / 2;

    // Simple path with a slight curve
    const midY = (fromY + toY) / 2;
    const d = `M ${fromX} ${fromY} C ${fromX} ${midY}, ${toX} ${midY}, ${toX} ${toY}`;

    const path = createSVGElement('path', {
      d,
      class: `edge-path ${edge.structural ? 'structural' : 'data'}`,
      'data-edge': edge.key,
      'marker-end': edge.structural ? '' : 'url(#arrow-data)'
    });
    edgesGroup.appendChild(path);

    // Edge value label (hidden initially)
    if (!edge.structural) {
      const labelX = (fromX + toX) / 2;
      const labelY = midY;
      const bg = createSVGElement('rect', {
        x: labelX - 20, y: labelY - 8, width: 40, height: 16,
        class: 'edge-value-bg',
        'data-edge-val-bg': edge.key,
        style: 'display:none'
      });
      const text = createSVGElement('text', {
        x: labelX, y: labelY,
        class: 'edge-value',
        'data-edge-val': edge.key,
        style: 'display:none'
      });
      valuesGroup.appendChild(bg);
      valuesGroup.appendChild(text);
    }
  }

  // Draw nodes
  for (const node of Object.values(nodes)) {
    const pos = positions[node.id];
    if (!pos) continue;

    const typeClass = `type-${node.type.toLowerCase()}`;
    const g = createSVGElement('g', {
      class: 'node-group',
      transform: `translate(${pos.x}, ${pos.y})`,
      'data-node': node.id
    });

    const totalH = node.sublabel ? pos.h + 6 : pos.h;

    const rect = createSVGElement('rect', {
      x: -pos.w / 2, y: -totalH / 2,
      width: pos.w, height: totalH,
      class: `node-rect ${typeClass}`,
      'data-node-rect': node.id
    });
    g.appendChild(rect);

    const idLabel = createSVGElement('text', {
      x: -pos.w / 2 + 8, y: -totalH / 2 + 12,
      class: 'node-id',
      'data-node-id-label': node.id
    });
    idLabel.textContent = `#${node.id}`;
    g.appendChild(idLabel);

    const labelY = node.sublabel ? -4 : 0;
    const label = createSVGElement('text', {
      x: 0, y: labelY,
      class: 'node-label',
      'data-node-label': node.id
    });
    label.textContent = node.type;
    g.appendChild(label);

    if (node.sublabel) {
      const sub = createSVGElement('text', {
        x: 0, y: labelY + 14,
        class: 'node-sublabel',
        'data-node-sublabel': node.id
      });
      sub.textContent = node.sublabel;
      g.appendChild(sub);
    }

    // Value badge (hidden initially)
    const valueBadge = createSVGElement('text', {
      x: 0, y: totalH / 2 + 14,
      class: 'node-value',
      'data-node-value': node.id,
      style: 'display:none'
    });
    g.appendChild(valueBadge);

    nodesGroup.appendChild(g);
  }

  // Fit viewBox
  fitViewBox(positions);
}

function fitViewBox(positions) {
  const svg = document.getElementById('graph-svg');
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

  for (const pos of Object.values(positions)) {
    minX = Math.min(minX, pos.x - pos.w / 2);
    minY = Math.min(minY, pos.y - pos.h / 2);
    maxX = Math.max(maxX, pos.x + pos.w / 2);
    maxY = Math.max(maxY, pos.y + pos.h / 2);
  }

  const pad = 60;
  svg.setAttribute('viewBox',
    `${minX - pad} ${minY - pad} ${maxX - minX + pad * 2} ${maxY - minY + pad * 2 + 30}`);
}

// ── Render IR source ──
function renderIRSource(nodes) {
  const container = document.getElementById('ir-source');
  // Keep the h2
  container.innerHTML = '<h2>IR Source</h2>';

  for (const node of Object.values(nodes)) {
    const div = document.createElement('div');
    div.className = 'ir-line inactive';
    div.setAttribute('data-ir-node', node.id);
    div.textContent = node.line;
    container.appendChild(div);
  }
}

// ── Update display for a step ──
function applyStep(step, nodes, edges) {
  const allNodeIds = Object.keys(nodes).map(Number);

  // Classify each node
  for (const id of allNodeIds) {
    const isActive = step.activeNodes.includes(id);
    const isCompleted = step.completedNodes.includes(id);

    // Node rect
    const rect = document.querySelector(`[data-node-rect="${id}"]`);
    if (rect) {
      rect.classList.remove('active', 'completed', 'inactive');
      if (isActive) rect.classList.add('active');
      else if (isCompleted) rect.classList.add('completed');
      else rect.classList.add('inactive');
    }

    // Node label
    const label = document.querySelector(`[data-node-label="${id}"]`);
    if (label) {
      label.classList.remove('active', 'inactive');
      if (isActive) label.classList.add('active');
      else if (!isCompleted) label.classList.add('inactive');
    }

    // Node id label
    const idLabel = document.querySelector(`[data-node-id-label="${id}"]`);
    if (idLabel) {
      idLabel.classList.remove('inactive');
      if (!isActive && !isCompleted) idLabel.classList.add('inactive');
    }

    // Node sublabel
    const sub = document.querySelector(`[data-node-sublabel="${id}"]`);
    if (sub) {
      sub.classList.remove('inactive');
      if (!isActive && !isCompleted) sub.classList.add('inactive');
    }

    // Node value
    const valEl = document.querySelector(`[data-node-value="${id}"]`);
    if (valEl) {
      if (step.values[id] !== undefined) {
        valEl.textContent = step.values[id];
        valEl.style.display = '';
        valEl.setAttribute('fill', isActive ? 'var(--yellow)' : 'var(--green)');
      } else {
        valEl.style.display = 'none';
      }
    }

    // IR source line
    const irLine = document.querySelector(`[data-ir-node="${id}"]`);
    if (irLine) {
      irLine.className = 'ir-line';
      if (isActive) irLine.classList.add('active');
      else if (isCompleted) irLine.classList.add('completed');
      else irLine.classList.add('inactive');
    }
  }

  // Classify each edge
  for (const edge of edges) {
    const isActive = step.activeEdges.includes(edge.key);
    const isCompleted = step.completedEdges.includes(edge.key);

    const path = document.querySelector(`[data-edge="${edge.key}"]`);
    if (path) {
      path.classList.remove('active', 'completed', 'inactive');
      if (edge.structural) {
        // structural edges stay as-is
      } else if (isActive) {
        path.classList.add('active');
        path.setAttribute('marker-end', 'url(#arrow-active)');
      } else if (isCompleted) {
        path.classList.add('completed');
        path.setAttribute('marker-end', 'url(#arrow-completed)');
      } else {
        path.classList.add('inactive');
        path.setAttribute('marker-end', 'url(#arrow-data)');
      }
    }
  }

  // Update step info
  const stepInfo = document.getElementById('step-info');
  stepInfo.innerHTML = `
    <div class="step-num">Step ${currentStep} / ${steps.length - 1}: ${step.name}</div>
    <div class="step-desc">${step.desc}</div>
  `;
}

// ── State ──
let nodes, edges, positions, steps;
let currentStep = 0;

function init() {
  const paramA = parseInt(document.getElementById('param-a').value) || 0;
  const paramB = parseInt(document.getElementById('param-b').value) || 0;

  nodes = parseIR(IR_TEXT);
  edges = buildEdges(nodes);
  positions = layoutGraph(nodes, edges);
  steps = buildExecutionSteps(nodes, paramA, paramB);
  currentStep = 0;

  renderGraph(nodes, edges, positions);
  renderIRSource(nodes);
  applyStep(steps[0], nodes, edges);
  updateButtons();
}

function goToStep(n) {
  currentStep = Math.max(0, Math.min(steps.length - 1, n));
  applyStep(steps[currentStep], nodes, edges);
  updateButtons();
}

function updateButtons() {
  document.getElementById('btn-first').disabled = currentStep === 0;
  document.getElementById('btn-prev').disabled = currentStep === 0;
  document.getElementById('btn-next').disabled = currentStep === steps.length - 1;
  document.getElementById('btn-last').disabled = currentStep === steps.length - 1;
}

// ── Event listeners ──
document.getElementById('btn-first').addEventListener('click', () => goToStep(0));
document.getElementById('btn-prev').addEventListener('click', () => goToStep(currentStep - 1));
document.getElementById('btn-next').addEventListener('click', () => goToStep(currentStep + 1));
document.getElementById('btn-last').addEventListener('click', () => goToStep(steps.length - 1));

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft') { e.preventDefault(); goToStep(currentStep - 1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); goToStep(currentStep + 1); }
  if (e.key === 'Home') { e.preventDefault(); goToStep(0); }
  if (e.key === 'End') { e.preventDefault(); goToStep(steps.length - 1); }
});

document.getElementById('apply-params').addEventListener('click', init);
document.getElementById('param-a').addEventListener('keydown', (e) => { if (e.key === 'Enter') init(); });
document.getElementById('param-b').addEventListener('keydown', (e) => { if (e.key === 'Enter') init(); });

// ── Init ──
init();
</script>
